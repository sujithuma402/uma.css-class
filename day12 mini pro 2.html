<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport"content="width=device-width,initial-scale=1.0">
    <title>Traffic Light Sequence</title>
    </head>
    <body>
        <script>
            let currentstate="red";
            let nextState;
            switch(currentState){
                case "red":
                    nextstate="green";
                    break;
                case "yellow":
                    nextState="red";
                    break;
                case "green":
                    nextState="yellow";
                    break;
                default:
                    nextstate="invaid";
            }
            console.log('The light changes from ${currentState}to ${nextState}.');
            document.write('The light changes from ${currentState}to ${nextState}.');
            </script>
    </body>
</html>
