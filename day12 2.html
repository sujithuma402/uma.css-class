<!DOCTYPE html>
<html lang="en">

    <meta charset="UTF-8">

    <body>
        <h1>Traffic Light Sequence Logic</h1>
        <script>
            let currentState="red";
            let nextState;
            switch(currentState){
                case  "red":
                    nextState="green";
                    break;
                    case "yellow":
                        nextState="red";
                        break;
                        case "green":
                            nextState="yellow";
                            break;
                            default:
                                nextState="invaild";
            }
            console.log('The light changes from ${currentstate}to ${nextState}.');
        </script>
    </body>
</html>
